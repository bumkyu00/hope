project: DreamLoRA
question: "Nested adapter + think retrieval chain으로 LLM 개인화 기억을 context window 너머로 지속하고 일반화할 수 있는가?"
status: inner_loop
phase: exp11_nested_passthrough_4B

models:
  primary: "Qwen/Qwen3.5-4B"
  validation: "Qwen/Qwen3.5-0.8B"

hypotheses:
  H1_qa_encoding:
    status: confirmed
    result: "QA 형태로 30개 사실 100% recall 가능"

  H2_context_generalization:
    status: confirmed
    result: "Context 예시 추가로 일반화 50% → 70%"

  H3_think_retrieval:
    status: confirmed
    result: "Think retrieval chain이 spreading activation 가능하게 함 (Exp 4)"

  H4_dream_density:
    status: confirmed
    result: "5 dreams/fact이 일반화 임계점 (Exp 5)"

  H5_cms_front:
    status: confirmed
    result: "CMS-front > CMS-mid > Uniform for sanity preservation (Exp 6, 8)"

  H6_nested_adapter:
    status: confirmed
    result: "Nested adapter가 LoRA 대비 2배 memory, 1/100 params (Exp 9)"
    detail: "Mem 70% / San 80% @ step 100, 0.035% params"

  H7_passthrough_pattern:
    status: partially_confirmed
    result: "Passthrough think 패턴이 sanity 오염을 대폭 감소 (Exp 10, 40%→88%)"
    gap: "Memory 70%→55% 하락. 4B에서 검증 필요. 정성평가에서 래프팅→밀알레르기 교차 오염 남음."

  H8_nested_passthrough_4B:
    status: untested
    prediction: "4B + nested adapter + passthrough think → memory 높이면서 비문 제거, sanity 유지"

  H9_grpo_gating:
    status: untested
    prediction: "GRPO/DPO로 기억 활성화 policy 개선 가능"

current_focus: consolidation_and_scaling
status: outer_loop_reflection
priority_queue:
  - adapter_pruning_merge
  - multi_domain_memory
  - dream_auto_generation
  - real_repo_e2e_test

metrics:
  proxy: "memory activation + sanity (20+20 questions, manual verification)"
  best_nested_0.8B: "Mem 70% / San 80% (Exp 9, step 100)"
  best_passthrough_0.8B: "Mem 55% / San 88% (Exp 10, step 100)"

compute:
  gpu: "A100 80GB x1"
  constraint: "CUDA 11.8/12.8 mismatch, 9B OOM"

notes:
  - "모든 실험에서 체크포인트, 로그, 전체 입출력 JSON 저장 필수"
  - "auto 키워드 판정은 과대평가. 수동 검증 필수"
  - "0.8B는 비문 문제. 4B로 스케일업 필요"
